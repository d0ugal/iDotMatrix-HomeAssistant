display_moon:
  name: Display moon
  description: Render the current moon phase and upload it to the display. Becomes the new default.
  fields:
    display_for:
      name: Display for
      description: Revert to the previous default after this many seconds.
      required: false
      selector:
        number:
          min: 1
          mode: box
          unit_of_measurement: seconds

display_now_playing:
  name: Display now playing
  description: Show album art with scrolling track/artist overlay from a media player. Becomes the new default.
  fields:
    entity_id:
      name: Media player
      description: The media player entity to read art and metadata from.
      required: true
      selector:
        entity:
          domain: media_player
    display_for:
      name: Display for
      description: Revert to the previous default after this many seconds.
      required: false
      selector:
        number:
          min: 1
          mode: box
          unit_of_measurement: seconds

display_image:
  name: Display image
  description: Upload any image or animated GIF. Centre-cropped and resized to 64×64. Becomes the new default unless display_for is set.
  fields:
    path:
      name: Path
      description: Absolute path to a PNG, JPG, or GIF file. Mutually exclusive with entity_id.
      required: false
      example: /config/www/doorbell.gif
      selector:
        text:
    entity_id:
      name: Camera or image entity
      description: A camera or image entity to snapshot and display. Mutually exclusive with path.
      required: false
      selector:
        entity:
          domain:
            - camera
            - image
    display_for:
      name: Display for
      description: Revert to the previous default after this many seconds.
      required: false
      selector:
        number:
          min: 1
          mode: box
          unit_of_measurement: seconds

display_stream:
  name: Display stream
  description: >
    Repeatedly snapshot a camera entity and push frames to the display for the
    given duration.  Frame rate depends on BLE throughput — expect 1–3 FPS.
    Reverts to the default display when the duration elapses or another display
    action is triggered.
  fields:
    entity_id:
      name: Camera entity
      description: The camera entity to stream from.
      required: true
      selector:
        entity:
          domain: camera
    stream_for:
      name: Stream for
      description: How many seconds to stream before reverting to the default display.
      required: true
      selector:
        number:
          min: 1
          mode: box
          unit_of_measurement: seconds

display_emoji:
  name: Display emoji
  description: >
    Fetch a Twemoji image and display it at 64×64. Accepts the emoji character
    directly (🔔) or its name with or without colons (bell or :bell:).
    Result is cached on disk.
  fields:
    emoji:
      name: Emoji
      description: The emoji to display — character (🔔), name (bell), or colon-wrapped name (:bell:).
      required: true
      example: "bell"
      selector:
        text:
    display_for:
      name: Display for
      description: Revert to the previous default after this many seconds.
      required: false
      selector:
        number:
          min: 1
          mode: box
          unit_of_measurement: seconds
